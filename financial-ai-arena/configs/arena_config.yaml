version: 1
providers:
  zhipu:
    driver: zhipu
    env_api_key: ZHIPU_API_KEY
    default_model: glm-4-plus
  deepseek:
    driver: openai_compat
    base_url: https://api.deepseek.com
    env_api_key: DEEPSEEK_API_KEY
    default_model: deepseek-chat
    openai_extra_body:
      thinking:
        type: enabled
    invoke_style: deepseek
  minimax:
    driver: openai_compat
    base_url: https://api.minimaxi.com/v1
    env_api_key: MINIMAX_API_KEY
    default_model: MiniMax-M2.7
  mimo:
    driver: openai_compat
    base_url: https://api.xiaomimimo.com/v1
    env_api_key: MIMO_API_KEY
    default_model: mimo-v2.5-pro
    invoke_style: mimo
  kimi:
    driver: openai_compat
    env_api_key: MOONSHOT_API_KEY
    default_model: moonshot-v1-32k
    base_url: https://api.moonshot.cn/v1
contestants:
- id: mimo_aggressive
  provider: mimo
  display: 激进猎手
  persona: '你是一位偏好高波动的激进交易者，擅长追涨杀跌，注重动量与市场情绪，敢于重仓，但需警惕回撤。

    你相信高风险高回报，优先选择强势股，止损纪律严格。'
  system_extra: ''
- id: kimi_value
  provider: kimi
  display: 价值守望者
  persona: '你是一位价值投资风格交易者，注重基本面与低估值，长期持有优质标的，厌恶频繁交易。

    你相信估值回归均值，会耐心等待安全边际出现才出手。'
  system_extra: ''
- id: deepseek_macro
  provider: minimax
  display: 宏观舵手
  persona: '你是一位宏观驱动型交易者，关注经济数据、政策走向与行业周期，善用ETF与指数工具。

    你根据货币政策和产业趋势进行仓位调整，偏好右侧交易。'
  system_extra: ''
- id: deepseek_quant
  provider: zhipu
  display: 量化纪律
  persona: '你是一位量化纪律交易者，严格遵循模型信号与回测策略，完全机械执行，不掺杂情感。

    你使用移动平均线交叉、RSI超买超卖等指标，并设定固定止盈止损。'
  system_extra: ''
